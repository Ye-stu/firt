<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>短临预报 Demo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #fff;
      --border: #e2e6ed;
      --text: #1a1a2e;
      --sub: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --user-bg: #eff6ff;
      --bot-bg: #f9fafb;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 800px;
      height: 95vh;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
      overflow: hidden;
    }

    /* --- header --- */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .hint { font-size: 13px; color: var(--sub); margin-top: 2px; }

    /* --- messages --- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 90%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.7;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid #bfdbfe;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }
    .msg.empty {
      align-self: center;
      color: var(--sub);
      font-size: 14px;
      background: none;
      border: none;
      text-align: center;
      margin-top: 60px;
    }
    .msg .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .msg .time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }

    /* --- footer --- */
    .footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      align-items: center;
    }
    .footer input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border .2s;
    }
    .footer input:focus { border-color: var(--primary); }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .btn-outline:hover { background: #eff6ff; }
    .btn-reset {
      background: #fff;
      color: #ef4444;
      border: 1px solid #fecaca;
      font-size: 13px;
      padding: 8px 14px;
    }
    .btn-reset:hover { background: #fef2f2; }

    .loading::after {
      content: "…";
      animation: dots 1.4s infinite;
    }
    @keyframes dots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }

    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 24px 4px;
      flex-shrink: 0;
    }
    .presets button {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--sub);
      cursor: pointer;
    }
    .presets button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>深圳短临预报 Demo</h1>
      <div class="hint">点击「生成预报」→ LLM 根据短临数据生成 → 多轮对话修改</div>
    </div>
    <button class="btn-primary" @click="onGenerate" :disabled="loading">
      {{ loading ? '生成中' : hasGenerated ? '重新生成' : '生成预报' }}
    </button>
  </div>

  <!-- 快捷指令 -->
  <div class="presets" v-if="hasGenerated">
    <button v-for="p in presets" :key="p" @click="onPreset(p)">{{ p }}</button>
  </div>

  <!-- 消息列表 -->
  <div class="messages" ref="msgBox">
    <div v-if="messages.length === 0" class="msg empty">
      👆 先点击「生成预报」让 LLM 根据短临数据写一段服务提示
    </div>
    <div v-for="(m, i) in messages" :key="i" :class="['msg', m.role]">
      <div class="label">{{ m.role === 'user' ? '你' : '预报员' }}</div>
      {{ m.content }}
      <div class="time">{{ m.time }}</div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="footer">
    <input
      v-model="input"
      @keydown.enter="onRefine"
      placeholder="输入修改意见，例如：简单点、暴雨重点说…"
      :disabled="loading || !hasGenerated"
      ref="inputBox"
    />
    <button class="btn-primary" @click="onRefine" :disabled="loading || !input.trim()">
      发送
    </button>
    <button class="btn-reset" @click="onReset" :disabled="loading">清空</button>
  </div>
</div>

<script>
const { createApp, ref, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const messages = ref([]);
    const input = ref("");
    const loading = ref(false);
    const hasGenerated = ref(false);
    const msgBox = ref(null);
    const inputBox = ref(null);

    const presets = ["简单点", "暴雨重点说", "换一种说法", "把预报雨量调大点", "把深圳也补充进去"];

    function now() {
      return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    }

    function scrollBottom() {
      nextTick(() => {
        if (msgBox.value) msgBox.value.scrollTop = msgBox.value.scrollHeight;
      });
    }

    async function api(method, path, body) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      return res.json();
    }

    async function onGenerate() {
      loading.value = true;
      try {
        const data = await api("POST", "/api/generate");
        messages.value = [{ role: "assistant", content: data.forecast, time: now() }];
        hasGenerated.value = true;
        input.value = "";
        scrollBottom();
        inputBox.value?.focus();
      } catch (e) {
        messages.value = [{ role: "assistant", content: "请求失败: " + e.message, time: now() }];
      } finally {
        loading.value = false;
      }
    }

    async function onRefine() {
      const text = input.value.trim();
      if (!text || loading.value) return;
      messages.value.push({ role: "user", content: text, time: now() });
      input.value = "";
      scrollBottom();
      loading.value = true;
      try {
        const data = await api("POST", "/api/refine", { input: text });
        messages.value.push({ role: "assistant", content: data.forecast, time: now() });
        scrollBottom();
      } catch (e) {
        messages.value.push({ role: "assistant", content: "请求失败: " + e.message, time: now() });
      } finally {
        loading.value = false;
        inputBox.value?.focus();
      }
    }

    function onPreset(text) {
      input.value = text;
      onRefine();
    }

    async function onReset() {
      await api("POST", "/api/reset");
      messages.value = [];
      hasGenerated.value = false;
      input.value = "";
    }

    return {
      messages, input, loading, hasGenerated,
      msgBox, inputBox, presets,
      onGenerate, onRefine, onPreset, onReset,
    };
  }
}).mount("#app");
</script>
</body>
</html>
